<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nihon Tabiji — Ma carte du Japon</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink:      #1a1208;
      --paper:    #f5efe3;
      --paper2:   #ede5d4;
      --torii:    #c0392b;
      --torii2:   #e74c3c;
      --gold:     #b8860b;
      --muted:    #7a6a55;
      --line:     rgba(26,18,8,.12);
      --shadow:   0 4px 32px rgba(26,18,8,.18);
      --r:        6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--ink);
      color: var(--ink);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ─── Sidebar ─────────────────────────────────── */
    #sidebar {
      width: 320px;
      min-width: 280px;
      background: var(--paper);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      position: relative;
      z-index: 10;
    }

    #sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--paper2);
    }

    .app-title {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: .25em;
      color: var(--torii);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .app-subtitle {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -.01em;
      color: var(--ink);
      line-height: 1.1;
    }

    .app-kana {
      font-family: 'Noto Serif JP', serif;
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: .1em;
    }

    #add-btn {
      margin: 16px 24px 0;
      width: calc(100% - 48px);
      padding: 10px 16px;
      background: var(--torii);
      color: #fff;
      border: none;
      border-radius: var(--r);
      font-family: 'Crimson Pro', serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .04em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .2s, transform .1s;
    }
    #add-btn:hover  { background: var(--torii2); }
    #add-btn:active { transform: scale(.97); }
    #add-btn.active { background: var(--gold); }

    #add-btn .icon { font-size: 18px; line-height: 1; }

    #hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 8px 24px 0;
      min-height: 28px;
      font-style: italic;
      transition: opacity .3s;
    }

    /* search */
    #search-wrap {
      padding: 12px 24px 0;
    }
    #search {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: #fff;
      font-family: 'Crimson Pro', serif;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: var(--torii); }
    #search::placeholder { color: var(--muted); font-style: italic; }

    /* list */
    #places-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #places-list::-webkit-scrollbar { width: 4px; }
    #places-list::-webkit-scrollbar-track { background: transparent; }
    #places-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

    .place-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      position: relative;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .place-card:hover { border-color: var(--torii); box-shadow: 0 2px 12px rgba(192,57,43,.15); transform: translateX(2px); }
    .place-card.active { border-color: var(--torii); background: #fff8f6; }

    .card-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--torii);
      margin-top: 5px;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(192,57,43,.2);
    }

    .card-body { flex: 1; min-width: 0; }

    .card-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-note {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-cat {
      font-size: 11px;
      color: var(--torii);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .card-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity .2s;
    }
    .place-card:hover .card-actions { opacity: 1; }

    .card-actions button {
      width: 26px;
      height: 26px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--paper);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s;
    }
    .card-actions button:hover { background: #fff; border-color: var(--torii); }

    #empty-state {
      text-align: center;
      padding: 40px 24px;
      color: var(--muted);
    }
    #empty-state .es-icon { font-size: 40px; margin-bottom: 12px; }
    #empty-state p { font-style: italic; font-size: 14px; line-height: 1.6; }

    /* counter */
    #counter {
      padding: 10px 24px;
      border-top: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .04em;
    }

    /* ─── Map ─────────────────────────────────────── */
    #map-wrap {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* custom tiles: sepia filter */
    .leaflet-tile { filter: sepia(30%) brightness(1.05) saturate(0.85); }

    /* ─── Popup custom ────────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: var(--paper);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      padding: 0;
      overflow: hidden;
      font-family: 'Crimson Pro', serif;
    }
    .leaflet-popup-content { margin: 0; }
    .leaflet-popup-tip-container { display: none; }

    .popup-inner {
      padding: 16px 18px;
      min-width: 200px;
      max-width: 280px;
    }
    .popup-cat {
      font-size: 11px;
      color: var(--torii);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .popup-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .popup-note {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      line-height: 1.5;
    }
    .popup-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }
    .popup-actions button {
      flex: 1;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid var(--line);
      background: var(--paper2);
      font-family: 'Crimson Pro', serif;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
    }
    .popup-actions button:hover { background: #fff; }
    .popup-actions button.del { color: var(--torii); border-color: rgba(192,57,43,.3); }
    .popup-actions button.del:hover { background: #fff0ee; }

    /* ─── Modal ───────────────────────────────────── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,18,8,.5);
      backdrop-filter: blur(3px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    #modal-overlay.open { opacity: 1; pointer-events: all; }

    #modal {
      background: var(--paper);
      border-radius: 10px;
      padding: 28px 30px;
      width: 400px;
      max-width: calc(100vw - 48px);
      box-shadow: var(--shadow);
      transform: translateY(12px) scale(.97);
      transition: transform .25s;
      position: relative;
    }
    #modal-overlay.open #modal { transform: none; }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .modal-sub {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 20px;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: #fff;
      font-family: 'Crimson Pro', serif;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus,
    .field textarea:focus,
    .field select:focus { border-color: var(--torii); }
    .field textarea { resize: vertical; min-height: 70px; }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-btns button {
      flex: 1;
      padding: 10px;
      border-radius: var(--r);
      border: 1px solid var(--line);
      font-family: 'Crimson Pro', serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .modal-btns button:active { transform: scale(.97); }
    .btn-cancel { background: var(--paper2); color: var(--muted); }
    .btn-cancel:hover { background: #e8dfc9; }
    .btn-save { background: var(--torii); color: #fff; border-color: var(--torii) !important; }
    .btn-save:hover { background: var(--torii2); }

    /* ─── Custom Marker ───────────────────────────── */
    .custom-marker {
      width: 26px;
      height: 26px;
      background: var(--torii);
      border: 2px solid #fff;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      cursor: pointer;
      transition: transform .15s;
    }
    .custom-marker:hover { transform: rotate(-45deg) scale(1.15); }

    /* ─── Responsive ──────────────────────────────── */
    @media (max-width: 640px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; min-width: 0; height: 45vh; border-right: none; border-bottom: 1px solid var(--line); }
      #map-wrap { height: 55vh; }
    }
  </style>
</head>
<body>

<!-- ─── SIDEBAR ─────────────────────────────────────── -->
<aside id="sidebar">
  <div id="sidebar-header">
    <div class="app-title">Nihon Tabiji</div>
    <div class="app-subtitle">Ma carte du Japon</div>
    <div class="app-kana">日本旅路 — Les lieux à découvrir</div>
  </div>

  <button id="add-btn" onclick="toggleAddMode()">
    <span class="icon">⛩</span>
    <span id="add-btn-label">Ajouter un lieu</span>
  </button>
  <div id="hint"></div>

  <div id="search-wrap">
    <input id="search" type="text" placeholder="Rechercher un lieu…" oninput="renderList()" />
  </div>

  <div id="places-list"></div>

  <div id="counter"></div>
</aside>

<!-- ─── MAP ─────────────────────────────────────────── -->
<div id="map-wrap">
  <div id="map"></div>
</div>

<!-- ─── MODAL ────────────────────────────────────────── -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-title" id="modal-title">Nouveau lieu</div>
    <div class="modal-sub" id="modal-sub">Donnez un nom à cet endroit</div>

    <div class="field">
      <label>Nom du lieu *</label>
      <input id="f-name" type="text" placeholder="ex. Fushimi Inari" />
    </div>
    <div class="field">
      <label>Catégorie</label>
      <select id="f-cat">
        <option value="Temple / Sanctuaire">⛩ Temple / Sanctuaire</option>
        <option value="Nature">🌿 Nature</option>
        <option value="Ville / Quartier">🏙 Ville / Quartier</option>
        <option value="Gastronomie">🍜 Gastronomie</option>
        <option value="Culture / Musée">🎎 Culture / Musée</option>
        <option value="Hébergement">🏯 Hébergement</option>
        <option value="Shopping">🛍 Shopping</option>
        <option value="Autre">📍 Autre</option>
      </select>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="f-note" placeholder="Ce que tu veux voir, faire ou manger ici…"></textarea>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="savePlace()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ──────────────────────────────────────────────
const STORAGE_KEY = 'nihon-tabiji-places';
let places = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let addMode = false;
let pendingLatLng = null;
let editingId = null;
let markers = {};   // id → leaflet marker
let activeId = null;

const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(places));
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

// ─── MAP ───────────────────────────────────────────────
const map = L.map('map', {
  center: [36.5, 137.0],
  zoom: 5,
  zoomControl: false,
  attributionControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

map.on('click', e => {
  if (!addMode) return;
  pendingLatLng = e.latlng;
  openModal();
});

// ─── MARKERS ───────────────────────────────────────────
function makeIcon() {
  return L.divIcon({
    className: '',
    html: '<div class="custom-marker"></div>',
    iconSize: [26, 26],
    iconAnchor: [13, 26],
    popupAnchor: [0, -30]
  });
}

function addMarker(place) {
  const m = L.marker([place.lat, place.lng], { icon: makeIcon() }).addTo(map);

  m.bindPopup(() => {
    const el = document.createElement('div');
    el.className = 'popup-inner';
    el.innerHTML = `
      <div class="popup-cat">${place.cat}</div>
      <div class="popup-name">${esc(place.name)}</div>
      ${place.note ? `<div class="popup-note">${esc(place.note)}</div>` : ''}
      <div class="popup-actions">
        <button onclick="editPlace('${place.id}')">✏️ Modifier</button>
        <button class="del" onclick="deletePlace('${place.id}')">🗑 Supprimer</button>
      </div>`;
    return el;
  }, { maxWidth: 300 });

  m.on('click', () => { setActive(place.id); });
  markers[place.id] = m;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── ADD MODE ──────────────────────────────────────────
function toggleAddMode() {
  addMode = !addMode;
  const btn   = document.getElementById('add-btn');
  const label = document.getElementById('add-btn-label');
  const hint  = document.getElementById('hint');
  if (addMode) {
    btn.classList.add('active');
    label.textContent = 'Annuler la sélection';
    hint.textContent = 'Cliquez sur la carte pour placer un repère';
    map.getContainer().style.cursor = 'crosshair';
  } else {
    btn.classList.remove('active');
    label.textContent = 'Ajouter un lieu';
    hint.textContent = '';
    map.getContainer().style.cursor = '';
  }
}

// ─── MODAL ─────────────────────────────────────────────
function openModal(place) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent = place ? 'Modifier le lieu' : 'Nouveau lieu';
  document.getElementById('modal-sub').textContent   = place
    ? place.name
    : `Lat ${pendingLatLng.lat.toFixed(4)}, Lng ${pendingLatLng.lng.toFixed(4)}`;
  document.getElementById('f-name').value = place ? place.name : '';
  document.getElementById('f-cat').value  = place ? place.cat  : 'Temple / Sanctuaire';
  document.getElementById('f-note').value = place ? place.note : '';
  editingId = place ? place.id : null;
  overlay.classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 150);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  pendingLatLng = null;
  editingId = null;
  if (addMode) toggleAddMode();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) savePlace();
});

function savePlace() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }

  if (editingId) {
    const p = places.find(x => x.id === editingId);
    if (p) {
      p.name = name;
      p.cat  = document.getElementById('f-cat').value;
      p.note = document.getElementById('f-note').value.trim();
      // Refresh popup
      markers[p.id]?.closePopup();
    }
  } else {
    const p = {
      id:   uid(),
      name,
      cat:  document.getElementById('f-cat').value,
      note: document.getElementById('f-note').value.trim(),
      lat:  pendingLatLng.lat,
      lng:  pendingLatLng.lng
    };
    places.push(p);
    addMarker(p);
    setActive(p.id);
    map.flyTo([p.lat, p.lng], Math.max(map.getZoom(), 10), { duration: .8 });
  }

  save();
  renderList();
  closeModal();
}

// ─── DELETE & EDIT ─────────────────────────────────────
function deletePlace(id) {
  if (!confirm('Supprimer ce lieu ?')) return;
  map.closePopup();
  markers[id]?.remove();
  delete markers[id];
  places = places.filter(p => p.id !== id);
  save();
  if (activeId === id) activeId = null;
  renderList();
}

function editPlace(id) {
  map.closePopup();
  const p = places.find(x => x.id === id);
  if (!p) return;
  openModal(p);
}

// ─── ACTIVE STATE ──────────────────────────────────────
function setActive(id) {
  activeId = id;
  renderList();
  // highlight card
  document.querySelectorAll('.place-card').forEach(c => c.classList.toggle('active', c.dataset.id === id));
}

// ─── LIST ──────────────────────────────────────────────
function renderList() {
  const q   = document.getElementById('search').value.toLowerCase();
  const lst = document.getElementById('places-list');
  const ctr = document.getElementById('counter');

  const filtered = places.filter(p =>
    p.name.toLowerCase().includes(q) || (p.note || '').toLowerCase().includes(q) || p.cat.toLowerCase().includes(q)
  );

  ctr.textContent = places.length
    ? `${places.length} lieu${places.length > 1 ? 'x' : ''} enregistré${places.length > 1 ? 's' : ''}`
    : '';

  if (!filtered.length) {
    lst.innerHTML = `<div id="empty-state">
      <div class="es-icon">🗾</div>
      <p>${places.length ? 'Aucun résultat pour cette recherche.' : 'Aucun lieu pour l\'instant.<br/>Cliquez sur <em>Ajouter un lieu</em><br/>puis sur la carte pour commencer.'}</p>
    </div>`;
    return;
  }

  lst.innerHTML = '';
  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'place-card' + (p.id === activeId ? ' active' : '');
    card.dataset.id = p.id;
    card.innerHTML = `
      <div class="card-dot"></div>
      <div class="card-body">
        <div class="card-name">${esc(p.name)}</div>
        ${p.note ? `<div class="card-note">${esc(p.note)}</div>` : ''}
        <div class="card-cat">${esc(p.cat)}</div>
      </div>
      <div class="card-actions">
        <button title="Modifier" onclick="editPlace('${p.id}'); event.stopPropagation()">✏️</button>
        <button title="Supprimer" onclick="deletePlace('${p.id}'); event.stopPropagation()">🗑</button>
      </div>`;

    card.addEventListener('click', () => {
      setActive(p.id);
      map.flyTo([p.lat, p.lng], Math.max(map.getZoom(), 10), { duration: .8 });
      markers[p.id]?.openPopup();
    });

    lst.appendChild(card);
  });
}

// ─── INIT ──────────────────────────────────────────────
places.forEach(addMarker);
renderList();
</script>
</body>
</html>
